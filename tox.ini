[tox]
requires =
    tox>=4
envlist = py{310,311}-sphinx{81,80},py{312,313,314}-sphinx{91,90},py313-sphinx{81,80,74,73,72,71,70},py312{62,60}
isolated_build = True

[testenv]
deps =
  sphinx91: sphinx>=9.1.0,<9.2.0
  sphinx90: sphinx>=9.0.0,<9.1.0
  sphinx81: sphinx>=8.1.0,<8.2.0
  sphinx80: sphinx>=8.0.0,<8.1.0
  sphinx81: sphinx>=8.1.0,<8.2.0
  sphinx80: sphinx>=8.0.0,<8.1.0
  sphinx74: sphinx>=7.4.0,<8.0.0
  sphinx73: sphinx>=7.3.0,<7.4.0
  sphinx72: sphinx>=7.2.0,<7.3.0
  sphinx71: sphinx>=7.1.0,<7.2.0
  sphinx70: sphinx>=7.0.0,<7.1.0
  sphinx62: sphinx~=6.2.1
  sphinx60: sphinx>=6.0.0,<6.1.0
  pytest
  pytest-xdist
  defusedxml

commands =
  pytest -vv